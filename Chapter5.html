            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* Layouts */
        .slide-deck { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            background: #FAFAFA; 
            border-radius: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        .slide-wrapper { 
            height: 86vh; 
            position: relative; 
            overflow: hidden; 
            background-color: #F8FAFC; 
        }
        .slide { 
            display: none; 
            width: 100%; 
            height: 100%; 
            padding: 3vh 5vw; 
            flex-direction: column; 
            justify-content: flex-start; 
            animation: slideIn 0.25s ease-out; 
            position: absolute; 
            top: 0; 
            left: 0; 
            overflow: hidden; 
        }
        .slide.active { display: flex; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Global Header */

            display: flex; 
            justify-content: space-between; 
            align-items: center;

        h2.slide-title { font-family: 'Koulen', sans-serif; font-size: 2.5vw; font-weight: normal; border-bottom: 0.3vw solid var(--accent-purple); padding-bottom: 0.6vh; margin-bottom: 2vh; color: var(--text-main); display: inline-block; text-align: left !important; }

            gap: 2.5vw; 
            height: 100%; 
            align-items: center;

        .card { background: var(--bg-card); padding: 2.5vh 2.5vw; border-radius: 1vw; border-left: 0.7vw solid var(--accent-purple); box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; justify-content: center; }

            flex-direction: column; 
            align-items: center; 
            justify-content: center;

            overflow: hidden;
            position: relative;

            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: #F8FAFC;

            padding: 1.5vw;

        .copy-btn { position: absolute; top: 12px; right: 12px; padding: 6px 15px; cursor: pointer; background: var(--accent-blue); color: white; border: none; border-radius: 6px; font-family: 'Koulen', sans-serif; font-size: 0.8vw; transition: 0.3s; z-index: 5; font-weight: normal;}

        .workbook-note { background: #FEF9C3; border: 1px dashed var(--accent-yellow); padding: 1.6vh 2vw; border-radius: 10px; color: #854D0E; font-size: 1.4vw; display: flex; align-items: center; gap: 14px; font-weight: bold; margin-top: 1vh; box-shadow: 0 4px 6px rgba(0,0,0,0.02); text-align: left !important; }

        th, td { border: 1px solid #E2E8F0; padding: 1.2vh 1.6vw; text-align: left; vertical-align: middle; line-height: 1.6;}

        #nextBtn { right: 1.5vw; }

        @media print {

            .global-header { margin: -10mm -15mm 15px -15mm !important; padding: 5mm 15mm !important; height: auto !important; border-bottom: 2px solid var(--accent-purple) !important; }
            .global-header img { height: 11mm !important; }
            .global-header h1 { font-size: 14pt !important; }

            .slide-title { font-size: 20pt !important; margin-bottom: 12px !important; padding-bottom: 4px !important; border-bottom-width: 3px !important; }
            .content-body { overflow: hidden !important; height: auto !important; gap: 10px !important; }
            p, li, td { font-size: 12pt !important; line-height: 1.6 !important; }
            .card h4 { font-size: 15pt !important; margin-bottom: 4px !important; }
            .card { padding: 16px 22px !important; }
            .card-grid { gap: 14px !important; }
            .two-column { gap: 22px !important; }
            pre, code { font-size: 10pt !important; padding: 10px 14px !important; }
            .slide-deck > .global-footer { display: none !important; }
            .print-only-footer { display: flex !important; position: absolute !important; bottom: 0 !important; left: 0 !important; width: 100% !important; height: 15mm !important; padding: 0 15mm !important; background-color: var(--header-footer-bg) !important; border-top: 1px solid var(--border-light) !important; align-items: center !important; justify-content: space-between !important; z-index: 1000 !important; }

        }
    }

    // Simple C# and JSON Syntax Highlighter for custom render
    function highlightCSharp(code) {
        let escaped = code
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        const placeholders = [];
        
        // 1. Strings (including JSON string keys/values)
        escaped = escaped.replace(/(\$?\".*?\")/g, (match) => {
            placeholders.push(`<span style="color: #CE9178;">${match}</span>`);
            return `___PLACEHOLDER_${placeholders.length - 1}___`;
        });

        // 2. Comments
        escaped = escaped.replace(/(\/\/.*|#.*)/g, (match) => {
            placeholders.push(`<span style="color: #6A9955;">${match}</span>`);
            return `___PLACEHOLDER_${placeholders.length - 1}___`;
        });

        // 3. Attributes & JSON Brackets / Colons
        escaped = escaped.replace(/(\[[A-Za-z0-9_]+(?:\(.*?\))?\])/g, (match) => {
            placeholders.push(`<span style="color: #DCDCAA;">${match}</span>`);
            return `___PLACEHOLDER_${placeholders.length - 1}___`;
        });

        // 4. Keywords
        const keywords = ['using', 'namespace', 'public', 'private', 'static', 'class', 'return', 'new', 'if', 'var', 'string', 'int', 'null', 'void', 'bool', 'override', 'readonly', 'base', 'get', 'set', 'dotnet', 'add', 'package'];
        keywords.forEach(kw => {
            const regex = new RegExp(`\\b${kw}\\b`, 'g');
            escaped = escaped.replace(regex, `<span style="color: #569CD6;">${kw}</span>`);
        });

        // 5. Types & Main Classes
        const types = ['DbContext', 'DbContextOptions', 'DbSet', 'Student', 'AppDbContext', 'DbTestController', 'IActionResult', 'ControllerBase', 'WebApplication', 'Configuration'];
        types.forEach(t => {
            const regex = new RegExp(`\\b${t}\\b`, 'g');
            escaped = escaped.replace(regex, `<span style="color: #4EC9B0;">${t}</span>`);
        });

        // Restore placeholders
        for (let i = placeholders.length - 1; i >= 0; i--) {
            escaped = escaped.replace(`___PLACEHOLDER_${i}___`, placeholders[i]);
        }

        return escaped;
    }

            p.outerHTML = headerHTML;
        } else {
            p.outerHTML = ""; 
        }
    });

    // Interaction Logic
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    const counter = document.getElementById('slideCounter');
    let currentIdx = 0;

    // Clone footer to each slide for print mode
    const originalFooter = document.querySelector('.global-footer');
    slides.forEach((slide, idx) => {
        const slideFooter = originalFooter.cloneNode(true);
        slideFooter.classList.remove('global-footer'); 
        slideFooter.classList.add('print-only-footer'); 
        const counterEl = slideFooter.querySelector('.slide-counter');
        if (counterEl) {
            counterEl.innerHTML = `ស្លាយទី ${toKh(idx + 1)} នៃ ${toKh(totalSlides)}`;
        }
        slide.appendChild(slideFooter);
    });

    function updateSlide(idx) {
        slides.forEach(s => s.classList.remove('active'));
        slides[idx].classList.add('active');
        currentIdx = idx;
        counter.innerHTML = `ស្លាយទី ${toKh(idx + 1)} នៃ ${toKh(totalSlides)}`;
    }

    window.nextSlide = function(e) { if(e) e.stopPropagation(); if (currentIdx < totalSlides - 1) updateSlide(currentIdx + 1); }
    window.prevSlide = function(e) { if(e) e.stopPropagation(); if (currentIdx > 0) updateSlide(currentIdx - 1); }

    window.navigate = function(e) {
        if (e.target.closest('code') || e.target.closest('pre') || e.target.closest('.copy-btn') || e.target.closest('.nav-btn')) return;
        window.nextSlide();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") { window.nextSlide(); } 
        else if (e.key === "ArrowLeft" || e.key === "PageUp") { window.prevSlide(); }
    });

    window.copyCode = function(btn) {
        const pre = btn.nextElementSibling;
        if (pre) {
            const code = pre.querySelector('code') || pre;
            const text = code.textContent;
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
                }, 2000);
            });
        }
    };

    updateSlide(0);
</script>
</body>
</html>
